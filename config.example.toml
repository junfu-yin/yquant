[runtime]
# Internal storage is UTC; business scheduling follows XNYS / New York time.
timezone = "America/New_York"
data_dir = "data"
sqlite_path = "data/yquant.db"
parquet_dir = "data/parquet"
log_dir = "data/logs"

[data]
# v3.1a execution scope: US stocks and US-listed ETFs only.
markets = ["us"]
primary_source = "yfinance"
backup_sources = ["nasdaq"]
history_start = "2010-01-01"

[llm]
provider = "deepseek"
base_url = "https://api.deepseek.com"
model = "deepseek-chat"
api_key_env = "YQUANT_LLM_API_KEY"
# ADR-27: no hard daily budget cap. Optional soft USD alert threshold for the
# usage meter; comment out or set to a value to get an alert. Spend is always
# accounted.
# daily_budget_alert_usd = 5.0
timeout_seconds = 45
max_input_chars = 8000

[risk]
core_budget = 0.75
satellite_budget = 0.15
overlay_budget = 0.10
single_position_limit = 0.15
overlay_single_position_limit = 0.05
leveraged_etf_total_limit = 0.05
leveraged_etf_single_limit = 0.03
industry_position_limit = 0.35
drawdown_warning = 0.10
drawdown_strong_warning = 0.15
cooldown_loss_count = 3
cooldown_trading_days = 3

[notification.feishu]
webhook_env = "YQUANT_FEISHU_WEBHOOK"

[cost]
# M2 execution cost model (03 §5.2). Defaults match UsCostModel; verify the
# Selfwealth commission in WP0 AS-8. Slippage is tiered: ETFs 0.05%, single
# stocks 0.10% of notional. SEC fee + FINRA TAF apply on sells only.
commission_per_trade_usd = 9.50
sec_fee_rate = 0.0000278
finra_taf_per_share = 0.000166
finra_taf_cap_usd = 8.30
slippage_rate_etf = 0.0005
slippage_rate_single = 0.0010

[schedule]
# Unattended M1 daemon (optional). Cron strings are standard 5-field expressions
# interpreted in runtime.timezone; leave a *_cron unset to disable that job.
symbols = ["AAPL", "MSFT", "SPY"]
history_days = 5
update_cron = "30 17 * * 1-5"      # 17:30 New York on weekdays
freshness_cron = "45 17 * * 1-5"   # after the close
reconcile_cron = "0 18 * * 5"      # weekly Friday sampled live reconciliation
regime_cron = "50 17 * * 1-5"      # M9 Layer-1 state machine daily ledger entry
reconcile_sample_size = 2
reconcile_seed = 7
minutes_after_close = 45
calendar = "NYSE"

